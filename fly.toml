# fly.toml - конфигурация для Fly.io

app = "ddemonstr-bot"
primary_region = "sjc"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  timeout = "5s"
  method = "GET"
  path = "/api/transactions"

[mounts]
  source = "whale_data"
  destination = "/app/data"
